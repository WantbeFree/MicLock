<svg width="1120" height="780" viewBox="0 0 1120 780" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MicLock menu screenshot</title>
  <desc id="desc">Mock screenshot of the MicLock macOS menu bar app showing saved microphone inputs, refresh actions, fallback input selection, and open at login.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1120" y2="780" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E1B22"/>
      <stop offset="0.48" stop-color="#193342"/>
      <stop offset="1" stop-color="#061015"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(238 150) rotate(40) scale(420 260)">
      <stop stop-color="#4FE3D1" stop-opacity="0.46"/>
      <stop offset="1" stop-color="#4FE3D1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(870 614) rotate(-34) scale(360 230)">
      <stop stop-color="#7DB6FF" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#7DB6FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar" x1="144" y1="88" x2="976" y2="88" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EEF4F5" stop-opacity="0.90"/>
      <stop offset="1" stop-color="#D9E6EA" stop-opacity="0.82"/>
    </linearGradient>
    <filter id="shadow" x="244" y="111" width="632" height="590" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="35" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <filter id="softShadow" x="0" y="0" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#021016" flood-opacity="0.18"/>
    </filter>
    <style>
      .ui { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif; }
      .mono { font-family: "SF Mono", ui-monospace, Menlo, Monaco, Consolas, monospace; }
      .menuText { fill: #202326; font-size: 31px; font-weight: 520; letter-spacing: -0.35px; }
      .menuMuted { fill: #A8ADB2; font-size: 27px; font-weight: 520; letter-spacing: -0.25px; }
      .menuSmall { fill: #737B82; font-size: 23px; font-weight: 560; letter-spacing: -0.2px; }
      .label { fill: #B9CDD4; font-size: 24px; font-weight: 650; letter-spacing: 0.5px; }
      .title { fill: #F6FEFF; font-size: 56px; font-weight: 760; letter-spacing: -1.7px; }
      .subtitle { fill: #BFD4DA; font-size: 24px; font-weight: 500; letter-spacing: -0.2px; }
    </style>
  </defs>

  <rect width="1120" height="780" rx="44" fill="url(#bg)"/>
  <rect width="1120" height="780" rx="44" fill="url(#glowA)"/>
  <rect width="1120" height="780" rx="44" fill="url(#glowB)"/>

  <g class="ui">
    <text x="96" y="96" class="title">MicLock</text>
    <text x="99" y="133" class="subtitle">Menu bar microphone lock for macOS Bluetooth audio quality.</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="144" y="172" width="832" height="58" rx="29" fill="url(#bar)"/>
    <circle cx="193" cy="201" r="10" fill="#FA615C"/>
    <circle cx="227" cy="201" r="10" fill="#F6BF4F"/>
    <circle cx="261" cy="201" r="10" fill="#52C45A"/>
    <text x="806" y="209" class="ui mono" fill="#202B30" font-size="21" font-weight="600">Wed 12:10</text>
    <g transform="translate(724 186)">
      <path d="M19 8C19 3.58172 22.5817 0 27 0C31.4183 0 35 3.58172 35 8V22C35 26.4183 31.4183 30 27 30C22.5817 30 19 26.4183 19 22V8Z" fill="#0D2934"/>
      <rect x="23" y="4" width="8" height="18" rx="4" fill="#DFF7F5"/>
      <path d="M14 19C14 26.1797 19.8203 32 27 32C34.1797 32 40 26.1797 40 19" stroke="#0D2934" stroke-width="4" stroke-linecap="round"/>
      <path d="M27 33V43" stroke="#0D2934" stroke-width="4" stroke-linecap="round"/>
      <path d="M18 43H36" stroke="#0D2934" stroke-width="4" stroke-linecap="round"/>
    </g>
  </g>

  <g filter="url(#shadow)" class="ui">
    <rect x="282" y="136" width="556" height="538" rx="28" fill="#F7F8F8" fill-opacity="0.96"/>
    <rect x="282.5" y="136.5" width="555" height="537" rx="27.5" stroke="#FFFFFF" stroke-opacity="0.95"/>
    <rect x="282.5" y="136.5" width="555" height="537" rx="27.5" stroke="#C5CBD0" stroke-opacity="0.75"/>

    <text x="326" y="189" class="menuMuted">Version 1.6.5 (build 13)</text>
    <line x1="316" y1="220" x2="804" y2="220" stroke="#D8DADD" stroke-width="2"/>

    <text x="326" y="270" class="menuText">Pause</text>
    <line x1="316" y1="302" x2="804" y2="302" stroke="#D8DADD" stroke-width="2"/>

    <text x="326" y="350" class="menuMuted">Saved Inputs</text>
    <text x="326" y="403" class="menuText">✓ Primary: Elgato Wave XLR</text>
    <text x="326" y="451" class="menuText">  Fallback 1: MacBook Pro Mic</text>
    <text x="326" y="499" class="menuMuted">  Fallback 2: Studio Display Mic (Offline)</text>
    <line x1="316" y1="531" x2="804" y2="531" stroke="#D8DADD" stroke-width="2"/>

    <text x="326" y="582" class="menuText">Refresh Devices</text>
    <text x="326" y="630" class="menuText">Revive Audio...</text>
    <line x1="316" y1="662" x2="804" y2="662" stroke="#D8DADD" stroke-width="2"/>

    <text x="326" y="713" class="menuText">✓ Open at login</text>
  </g>

  <g class="ui">
    <rect x="80" y="608" width="310" height="74" rx="24" fill="#FFFFFF" fill-opacity="0.10" stroke="#FFFFFF" stroke-opacity="0.13"/>
    <text x="108" y="654" class="label">PRIMARY + 3 FALLBACKS</text>
    <rect x="424" y="608" width="278" height="74" rx="24" fill="#FFFFFF" fill-opacity="0.10" stroke="#FFFFFF" stroke-opacity="0.13"/>
    <text x="452" y="654" class="label">COREAUDIO REVIVE</text>
    <rect x="736" y="608" width="304" height="74" rx="24" fill="#FFFFFF" fill-opacity="0.10" stroke="#FFFFFF" stroke-opacity="0.13"/>
    <text x="764" y="654" class="label">SIGNED + NOTARIZED</text>
  </g>
</svg>
