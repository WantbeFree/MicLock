name: Bug report
description: Report a MicLock bug or regression.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: MicLock version
      placeholder: "1.6.5"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "macOS 26.4"
    validations:
      required: true
  - type: input
    id: hardware
    attributes:
      label: Mac model
      placeholder: "MacBook Pro M4 Pro"
  - type: textarea
    id: devices
    attributes:
      label: Audio devices
      description: List headphones, microphones, docks, hubs, and interfaces involved.
      placeholder: "AirPods Pro 3, Elgato Wave XLR, CalDigit TS5 Plus"
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Connect headphones\n2. Open Zoom\n3. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

